<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Cartly.in</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💳 Checkout</h1>

<h2>🏠 Delivery Address</h2>

<input type="text" id="name" placeholder="Full Name"><br><br>
<input type="text" id="phone" placeholder="Phone Number"><br><br>
<input type="text" id="address" placeholder="Address"><br><br>
<input type="text" id="city" placeholder="City"><br><br>
<input type="text" id="pincode" placeholder="Pincode"><br><br>

<!-- 💾 SAVE OPTION -->
<label>
  <input type="checkbox" id="save-address">
  💾 Save this address for next time
</label>

<br><br>

<h2>Your Items</h2>
<ul id="checkout-items"></ul>

<h3>Total: ₹<span id="checkout-total">0</span></h3>

<h2>Select Payment Method</h2>

<label><input type="radio" name="payment" value="cod" onclick="showPayment()"> 💵 COD</label><br>
<label><input type="radio" name="payment" value="upi" onclick="showPayment()"> 📱 UPI</label><br>
<label><input type="radio" name="payment" value="card" onclick="showPayment()"> 💳 Card</label>

<div id="upi-section" style="display:none;">
  <input type="text" id="upi-id" placeholder="UPI ID">
</div>

<div id="card-section" style="display:none;">
  <input type="text" id="card-number" placeholder="Card Number">
</div>

<br><br>

<button onclick="placeOrder()">✅ Place Order</button>

<script src="checkout.js"></script>
</body>
</html>
