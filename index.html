<!DOCTYPE html>
<html>
<head>
  <title>Cartly.in</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>🛒 Cartly.in</h1>
  <div class="cart-icon">
    🛒 <span id="cart-count">0</span>
  </div>
</div>

<!-- Search -->
<div class="search-box">
  <input 
    type="text" 
    id="search" 
    placeholder="🔍 Search products..." 
    onkeyup="applyFilters()"
  />
</div>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>🧾 Categories</h3>
    <button onclick="setCategory('All', this)" class="active">All</button>
    <button onclick="setCategory('Clothes', this)">👔 Clothes</button>
    <button onclick="setCategory('Accessories', this)">⌚ Accessories</button>

    <h3>💰 Sort</h3>
    <button onclick="setSort('low')">⬆ Low → High</button>
    <button onclick="setSort('high')">⬇ High → Low</button>
  </div>

  <!-- Products -->
  <div id="products"></div>

</div>

<!-- Cart -->
<h2>Cart</h2>
<ul id="cart"></ul>

<h3>Total: ₹<span id="total">0</span></h3>

<!-- ✅ CHECKOUT BUTTON -->
<button onclick="goToCheckout()">Proceed to Checkout 💳</button>

<script src="script.js"></script>
</body>
</html>
