<!DOCTYPE html>
<html>
<head>
  <title>Cartly.in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- ✅ PWA ADDITIONS (NEW) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
</head>
<body>

<!-- LOGIN CHECK -->
<script>
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>

<!-- NAVBAR -->
<div class="navbar">
  <h2>🛒 Cartly.in</h2>
  <div>
    <a href="wishlist.html">❤️ Wishlist</a>
    <a href="cart.html">🛍 Cart</a>
    <a href="#" onclick="logout()">🚪 Logout</a>
    <button onclick="toggleDarkMode()">🌙</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<!-- CATEGORIES -->
<div class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('fashion')">Fashion</button>
  <button onclick="filterCategory('electronics')">Electronics</button>
  <button onclick="filterCategory('accessories')">Accessories</button>
</div>

<!-- SORT -->
<div class="sort-box">
  <select onchange="sortProducts(this.value)">
    <option value="">Sort by Price</option>
    <option value="low">Low to High</option>
    <option value="high">High to Low</option>
  </select>
</div>

<!-- PRODUCTS -->
<div class="products">

  <div class="card" data-category="fashion">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400">
    <h3>Casual Shirt</h3>
    <p>₹799</p>
    <button onclick="addToCart('Casual Shirt',799,this.parentElement.querySelector('img').src)">Add to Cart</button>
    <button onclick="addToWishlist('Casual Shirt',799,this.parentElement.querySelector('img').src)">❤️ Wishlist</button>
  </div>

  <div class="card" data-category="fashion">

  </div>

  </div>

  <div class="card" data-category="fashion">
    <img src="https://images.unsplash.com/photo-1520975922284-8b456906c813?w=400">
    <h3>Leather Jacket</h3>

</div>

<script src="script.js"></script>

<!-- ✅ PWA SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker Registered ✅"))
    .catch(err => console.log(err));
}
</script>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}
</script>

</body>
</html>
